[meta]
style_name = "applsci_paper_plot_standard"
version = "0.1.0"
notes = "Load global settings first. Apply one category override only."

[global.font]
family = "Times New Roman"
fallback_families = ["TeX Gyre Termes", "Nimbus Roman", "Liberation Serif"]
body_font_size_pt = 10.0
title_enabled = false
label_size_scale = 1.0
tick_size_scale = 1.0
legend_size_scale = 1.0

[global.figure]
facecolor = "#FFFFFF"
dpi = 600
save_dpi = 600
save_vector_format = "pdf"
save_raster_format = "png"
bbox_inches = "tight"
pad_inches = 0.02
constrained_layout = true

[global.axes]
facecolor = "#FFFFFF"
edgecolor = "#1F1F1F"
linewidth = 1.35
labelcolor = "#1F1F1F"
labelpad = 4.0
titlepad = 0.0
show_top_spine = true
show_right_spine = true
grid_major = false
grid_minor = false

[global.ticks]
direction = "out"
color = "#1F1F1F"
major_width = 1.15
minor_width = 0.85
major_size = 6.0
minor_size = 3.4
major_pad = 3.0
minor_visible = true
minor_locator_divisions_x = 4
minor_locator_divisions_y = 4

[global.lines]
line_width = 1.9
marker_size = 4.0
solid_capstyle = "round"
solid_joinstyle = "round"
antialiased = true

[global.legend]
frameon = false
handlelength = 2.0
borderpad = 0.2
columnspacing = 0.8
labelspacing = 0.3

[global.text]
color = "#1F1F1F"
annotation_box_facecolor = "#FFFFFF"
annotation_box_edgecolor = "#1F1F1F"
annotation_box_linewidth = 0.8

[global.palette]
series = [
  "#1F3A5F",
  "#A54E2A",
  "#4C6A5D",
  "#B08B3E",
  "#7B4B3A",
  "#5A6772",
]
neutral_dark = "#1F1F1F"
neutral_mid = "#666666"
neutral_light = "#D9D9D9"
paper_bg = "#FFFFFF"
heatmap_sequential = ["#F6F2EA", "#DCC7A1", "#B08B3E", "#A54E2A", "#1F3A5F"]
heatmap_diverging = ["#1F3A5F", "#F6F2EA", "#A54E2A"]

[global.export]
transparent = false
metadata_creator = "Codex plotting standard"
metadata_description = "Times New Roman, body-size-matched figures with unified palette."

[overrides.timeseries]
fig_width_in = 6.9
fig_height_in = 3.2
line_width = 2.1
actual_alpha = 1.0
forecast_alpha = 0.95
band_alpha = 0.12
shock_region_alpha = 0.08
minor_locator_divisions_x = 4
minor_locator_divisions_y = 2

[overrides.bar]
fig_width_in = 6.4
fig_height_in = 3.2
bar_edgecolor = "#1F1F1F"
bar_linewidth = 0.85
group_gap = 0.80
label_rotation = 0
errorbar_linewidth = 0.9
errorbar_capsize = 2.5

[overrides.heatmap]
fig_width_in = 6.1
fig_height_in = 3.8
cmap = "custom_paper_map"
linecolor = "#FFFFFF"
linewidths = 0.55
annot = false
cbar_shrink = 0.92

[overrides.roc_pr]
fig_width_in = 3.35
fig_height_in = 2.7
line_width = 2.0
diag_line_width = 1.0
diag_line_style = "--"
diag_line_color = "#666666"

[overrides.ablation]
fig_width_in = 6.2
fig_height_in = 3.1
line_width = 1.9
marker = "o"
marker_size = 4.5

[overrides.efficiency]
fig_width_in = 6.0
fig_height_in = 3.0
bar_edgecolor = "#1F1F1F"
bar_linewidth = 0.80
use_log_scale_y = true

[overrides.delta]
fig_width_in = 7.4
fig_height_in = 3.1
line_width = 1.8
marker = "o"
marker_size = 4.2

[overrides.distribution]
fig_width_in = 6.8
fig_height_in = 2.9
box_linewidth = 0.9
median_linewidth = 1.2
whisker_linewidth = 0.9
