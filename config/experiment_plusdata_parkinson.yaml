project:
  name: applsci_volatility_wavelet_ml_plusdata_parkinson
  version: "0.2.0"
  random_state: 42
  raw_snapshot_date: "2026-03-19"

data:
  start_date: "2005-02-25"
  end_date: "2025-12-31"
  processed_panel_path: "data/processed/panel_features_plusdata_parkinson.csv.gz"
  indices:
    - id: spx
      label: "S&P 500"
      stooq_symbol: "^spx"
      etf_symbol: "spy.us"
      fred_vix_series: "VIXCLS"
    - id: ndq
      label: "Nasdaq-100"
      stooq_symbol: "^ndq"
      etf_symbol: "qqq.us"
      fred_vix_series: "VXNCLS"
    - id: dji
      label: "Dow Jones Industrial Average"
      stooq_symbol: "^dji"
      etf_symbol: "dia.us"
      fred_vix_series: "VXDCLS"
  fred_series:
    dff: "DFF"
    dgs10: "DGS10"
    dgs2: "DGS2"
    t10y3m: "T10Y3M"
    nfci: "NFCI"
    recession_dummy: "USRECD"
    hy_oas: "BAMLH0A0HYM2"
    ig_oas: "BAMLC0A0CM"
    usepu: "USEPUINDXD"
    rvx: "RVXCLS"
    vxv: "VXVCLS"

features:
  target:
    base_volatility: "parkinson"
    transform: "log1p"
    epsilon: 1.0e-8
  har_windows: [1, 5, 22]
  short_term_windows: [2, 3, 5]
  technical:
    rsi_period: 14
    atr_period: 14
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
  wavelet:
    enabled: true
    basis: "sym4"
    levels: 3
    min_history: 128
    max_history: 256
    energy_windows: [5, 22]
    series:
      - "parkinson_var"
      - "abs_ret"
      - "vix_like"
      - "hy_ig_oas_spread"
      - "vxv_vix_gap"

experiment:
  train_window_days: 1260
  refit_interval_days: 5
  test_start: "2016-01-04"
  test_end: "2025-12-31"
  horizons: [1, 5, 10]
  inner_cv_splits: 5
  rolling_step: 1
  qlike_calibration:
    enabled: true
    models:
      - "lightgbm"
      - "wavelet_lightgbm"
      - "main_stacking"
    floor_quantile: 0.01
    floor_quantile_by_horizon:
      1: 0.05
      5: 0.01
      10: 0.01
    use_scale: false
    scale_clip: [0.25, 4.0]
  warning_quantile: 0.90
  warning_beta: 2.0
  models:
    regression:
      - "last_value"
      - "hv_5"
      - "hv_22"
      - "har"
      - "harx"
      - "lightgbm"
      - "wavelet_lightgbm"
      - "main_stacking"
    classification:
      - "naive_threshold"
      - "forecast_threshold"
      - "logistic_raw"
      - "main_warning"

runtime:
  n_jobs: -1
  verbose: true
  smoke_defaults:
    start_date: "2010-01-01"
    indices: ["spx"]
    horizons: [1]
    test_end: "2016-03-31"
    max_test_steps: 10
    regression_models:
      - "last_value"
      - "har"
      - "lightgbm"
      - "wavelet_lightgbm"
    classification_models:
      - "naive_threshold"
      - "logistic_raw"
      - "main_warning"
